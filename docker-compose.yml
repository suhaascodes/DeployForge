services:
  postgres:
    image: postgres:15-alpine
    container_name: deployforge-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: deployforge
      POSTGRES_USER: deployforge
      POSTGRES_PASSWORD: deployforge_secure_pass
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: deployforge-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

  mongodb:
    image: mongo:6.0
    container_name: deployforge-mongodb
    ports:
      - "27018:27017"
    environment:
      MONGO_INITDB_DATABASE: deployforge
    volumes:
      - mongodb_data:/data/db
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: deployforge-backend
    ports:
      - "8080:8080"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/deployforge
      - SPRING_DATA_REDIS_HOST=redis
      - SPRING_DATA_MONGODB_URI=mongodb://mongodb:27017/deployforge
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      - postgres
      - redis
      - mongodb
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: deployforge-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  mongodb_data:
